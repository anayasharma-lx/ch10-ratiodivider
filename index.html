<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Day — Ch. 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ec;--paper:#fff;--sand:#e8e4db;--ink:#1a1714;--rule:#ccc8be;
  --display:'Bebas Neue',Impact,sans-serif;
  --mono:'DM Mono',monospace;--body:'DM Sans',sans-serif;
}
html{background:var(--bg)}
body{font-family:var(--body);background:var(--bg);color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased;padding:0}

/* MASTHEAD */
.masthead{border-bottom:3px solid var(--ink);padding:16px 28px 12px;
  display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:baseline}
.m-tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;opacity:.4;white-space:nowrap}
.m-title{font-family:var(--display);font-size:clamp(26px,6vw,52px);line-height:.92;
  text-align:center;letter-spacing:.02em}
.m-right{font-family:var(--mono);font-size:10px;opacity:.4;text-align:right;white-space:nowrap}
@media(max-width:520px){.masthead{grid-template-columns:1fr}.m-tag,.m-right{display:none}}

/* INTRO */
.intro-strip{padding:14px 28px;border-bottom:1px solid var(--rule);
  font-size:14px;line-height:1.6;color:var(--ink);opacity:.65}
.intro-strip strong{opacity:1}

/* ACTIVITY SLIDERS */
.sliders-section{padding:20px 28px;background:var(--paper);border-bottom:1px solid var(--rule)}
.act-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.act-row:last-child{margin-bottom:0}
.act-swatch{width:16px;height:36px;border-radius:3px;flex-shrink:0}
.act-name{font-size:13px;font-weight:600;color:var(--ink);min-width:120px;flex-shrink:0}
.act-slider-wrap{flex:1;display:flex;flex-direction:column;gap:4px}

/* ── THE FIXED SLIDER ── */
/* Use a wrapper + pseudo-track approach so it renders on all browsers */
.range-wrap{position:relative;height:20px;display:flex;align-items:center}
.range-track{position:absolute;left:0;right:0;height:6px;border-radius:3px;background:var(--rule)}
.range-fill{position:absolute;left:0;height:6px;border-radius:3px;pointer-events:none}
input[type=range].act-sl{
  -webkit-appearance:none;appearance:none;
  position:absolute;left:0;right:0;width:100%;
  margin:0;padding:0;height:6px;
  background:transparent;
  outline:none;cursor:pointer;z-index:2;
}
input[type=range].act-sl::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:26px;height:26px;border-radius:50%;
  background:#fff;
  border:3px solid var(--thumb-color, #888);
  box-shadow:0 1px 4px rgba(0,0,0,.25);
  cursor:grab;margin-top:-10px;
}
input[type=range].act-sl:active::-webkit-slider-thumb{cursor:grabbing;}
input[type=range].act-sl::-moz-range-thumb{
  width:22px;height:22px;border-radius:50%;
  background:#fff;border:3px solid var(--thumb-color, #888);
  box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:grab;
}
input[type=range].act-sl::-webkit-slider-runnable-track{
  height:6px;border-radius:3px;background:transparent;
}
input[type=range].act-sl::-moz-range-track{
  height:6px;border-radius:3px;background:transparent;
}
.act-val{font-family:var(--display);font-size:22px;letter-spacing:.02em;min-width:42px;text-align:right;line-height:1}

/* TOTAL BAR */
.total-section{padding:16px 28px;border-bottom:1px solid var(--rule)}
.total-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.total-lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink);opacity:.4}
.total-val{font-family:var(--display);font-size:30px;letter-spacing:.02em;line-height:1}
.total-val.ok{color:#1a6e42}
.total-val.over{color:#b83020}
.total-val.under{color:#c47a0a}
.day-bar{display:flex;height:52px;border:2px solid var(--ink);overflow:hidden}
.day-seg{transition:flex .25s ease;display:flex;align-items:center;justify-content:center;
  overflow:hidden;min-width:0}
.day-seg span{font-size:10px;font-weight:700;color:rgba(255,255,255,.9);
  font-family:var(--mono);pointer-events:none;white-space:nowrap}
.bar-scale{display:flex;justify-content:space-between;font-family:var(--mono);
  font-size:10px;color:var(--ink);opacity:.4;margin-top:4px;padding:0 2px}

/* VIZ GRID */
.viz-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--rule)}
@media(max-width:540px){.viz-grid{grid-template-columns:1fr}}
.viz-cell{padding:18px 22px;border-right:1px solid var(--rule)}
.viz-cell:last-child{border-right:none}
.viz-head{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink);opacity:.4;margin-bottom:12px}
canvas{display:block;margin:0 auto}
.legend{display:flex;flex-direction:column;gap:4px;margin-top:10px}
.leg-row{display:flex;align-items:center;gap:7px;font-size:12px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.leg-pct{font-family:var(--mono);font-size:11px;color:var(--ink);opacity:.4;margin-left:auto}

/* RATIO BOX */
.ratio-section{padding:18px 28px;background:var(--ink);
  font-family:var(--mono);font-size:12px;color:#f0ece3;line-height:1.9;
  border-bottom:1px solid var(--rule)}
.rs-hl{color:#e8a840;font-weight:600}

/* INSIGHT */
.insight-row{padding:18px 28px;display:grid;grid-template-columns:3px 1fr;gap:14px}
.ins-bar{background:var(--ink)}
.ins-text{font-size:14px;line-height:1.75;color:var(--ink);opacity:.7}
.ins-text strong{opacity:1}
</style>
</head>
<body>

<div class="masthead">
  <div class="m-tag">Ch. 3 · Proportional Reasoning</div>
  <div class="m-title">My Day — 24 Hours</div>
  <div class="m-right">Grade 8 · Oxford / Bhanzu</div>
</div>

<div class="intro-strip">
  A day has exactly <strong>24 hours</strong>. Drag the sliders to set how you spend them. The ratio, pie chart and timeline update live — dividing a whole in a ratio.
</div>

<div class="sliders-section" id="sliders-section"></div>

<div class="total-section">
  <div class="total-head">
    <span class="total-lbl">Total hours used</span>
    <span class="total-val" id="total-val">0 / 24</span>
  </div>
  <div class="day-bar" id="day-bar"></div>
  <div class="bar-scale">
    <span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>24h</span>
  </div>
</div>

<div class="viz-grid">
  <div class="viz-cell">
    <div class="viz-head">Pie chart</div>
    <canvas id="pie-cvs" width="180" height="180"></canvas>
    <div class="legend" id="legend"></div>
  </div>
  <div class="viz-cell">
    <div class="viz-head">Breakdown</div>
    <div id="breakdown"></div>
  </div>
</div>

<div class="ratio-section" id="ratio-section"></div>

<div class="insight-row" id="insight-row"></div>

<script>
const ACTS=[
  {name:'Sleep',          color:'#1650a8',def:8, max:12},
  {name:'School / Study', color:'#b83020',def:6, max:12},
  {name:'Play / Hobbies', color:'#1a6e42',def:2, max:8},
  {name:'Eating',         color:'#c47a0a',def:1, max:4},
  {name:'Travel',         color:'#7a4ab0',def:1, max:6},
  {name:'Personal care',  color:'#0e7490',def:1, max:4},
  {name:'Screen / Media', color:'#5a5650',def:2, max:8},
];

let hours=ACTS.map(a=>a.def);

function gcd(a,b){return b<0.001?a:gcd(b,a%b);}
function fmtH(h){return h%1===0?h+'h':(Math.round(h*2)/2)+'h';}

// Build sliders
const sec=document.getElementById('sliders-section');
ACTS.forEach((act,i)=>{
  const row=document.createElement('div');
  row.className='act-row';
  row.innerHTML=`
    <div class="act-swatch" style="background:${act.color}"></div>
    <div class="act-name">${act.name}</div>
    <div class="act-slider-wrap">
      <div class="range-wrap">
        <div class="range-track"></div>
        <div class="range-fill" id="fill-${i}" style="background:${act.color}"></div>
        <input type="range" class="act-sl" id="sl-${i}"
          min="0" max="${act.max}" step="0.5" value="${act.def}"
          style="--thumb-color:${act.color}">
      </div>
    </div>
    <div class="act-val" id="val-${i}" style="color:${act.color}">${act.def}h</div>
  `;
  sec.appendChild(row);

  const sl=row.querySelector(`#sl-${i}`);
  const fill=row.querySelector(`#fill-${i}`);
  const valEl=row.querySelector(`#val-${i}`);

  function syncFill(){
    const frac=(hours[i]-0)/(act.max-0)*100;
    fill.style.width=frac+'%';
  }
  syncFill();

  sl.addEventListener('input',()=>{
    hours[i]=+sl.value;
    valEl.textContent=fmtH(hours[i]);
    syncFill();
    update();
  });
});

function update(){
  const total=hours.reduce((s,h)=>s+h,0);
  const tv=document.getElementById('total-val');
  tv.textContent=fmtH(total)+' / 24h';
  tv.className='total-val '+(Math.abs(total-24)<0.01?'ok':total>24?'over':'under');

  drawBar(total);
  drawPie(total);
  drawBreakdown(total);
  drawRatio(total);
  drawInsight(total);
}

function drawBar(total){
  const bar=document.getElementById('day-bar');
  bar.innerHTML='';
  hours.forEach((h,i)=>{
    if(h<=0) return;
    const seg=document.createElement('div');
    seg.className='day-seg';
    seg.style.flex=h/24*100;
    seg.style.background=ACTS[i].color+'cc';
    if((h/24)>0.07){
      const sp=document.createElement('span');
      sp.textContent=fmtH(h);
      seg.appendChild(sp);
    }
    bar.appendChild(seg);
  });
  if(total<24){
    const rem=document.createElement('div');
    rem.className='day-seg';
    rem.style.flex=(24-total)/24*100;
    rem.style.background='#ccc8be44';
    bar.appendChild(rem);
  }
}

function drawPie(total){
  const cvs=document.getElementById('pie-cvs');
  const PR=Math.min(window.devicePixelRatio||1,2);
  const sz=180;
  cvs.width=sz*PR;cvs.height=sz*PR;cvs.style.width=sz+'px';cvs.style.height=sz+'px';
  const ctx=cvs.getContext('2d');
  ctx.scale(PR,PR);
  ctx.fillStyle='#f4f2ec';ctx.fillRect(0,0,sz,sz);

  const cx=sz/2,cy=sz/2,R=78;
  let ang=-Math.PI/2;
  const denom=Math.max(total,24);
  hours.forEach((h,i)=>{
    if(h<=0) return;
    const slice=(h/denom)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,ang,ang+slice);ctx.closePath();
    ctx.fillStyle=ACTS[i].color+'cc';ctx.fill();
    ctx.strokeStyle='#f4f2ec';ctx.lineWidth=2;ctx.stroke();
    if(slice>0.2){
      const mx=cx+Math.cos(ang+slice/2)*R*0.64,my=cy+Math.sin(ang+slice/2)*R*0.64;
      ctx.fillStyle='#fff';ctx.font='bold 9px DM Mono';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(fmtH(h),mx,my);ctx.textBaseline='alphabetic';
    }
    ang+=slice;
  });
  if(total<24){
    const rem=(24-total)/24*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,ang,ang+rem);ctx.closePath();
    ctx.fillStyle='#ccc8be55';ctx.fill();ctx.strokeStyle='#f4f2ec';ctx.lineWidth=2;ctx.stroke();
  }

  // Legend
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  hours.forEach((h,i)=>{
    if(h<=0) return;
    const pct=(h/Math.max(total,0.01)*100).toFixed(0);
    const d=document.createElement('div');d.className='leg-row';
    d.innerHTML=`<div class="leg-dot" style="background:${ACTS[i].color}"></div>
      <span>${ACTS[i].name}</span><span class="leg-pct">${pct}%</span>`;
    leg.appendChild(d);
  });
}

function drawBreakdown(total){
  const el=document.getElementById('breakdown');
  el.innerHTML='';
  const sorted=[...hours.map((h,i)=>({h,i}))].filter(x=>x.h>0).sort((a,b)=>b.h-a.h);
  sorted.forEach(({h,i})=>{
    const pct=(h/Math.max(total,0.01)*100).toFixed(0);
    const barW=Math.round(pct);
    const div=document.createElement('div');
    div.style.cssText='margin-bottom:8px';
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);margin-bottom:3px">
        <span style="font-weight:600;color:${ACTS[i].color}">${ACTS[i].name}</span>
        <span style="opacity:.5">${fmtH(h)} · ${pct}%</span>
      </div>
      <div style="height:10px;background:#e8e4db;border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${ACTS[i].color};border-radius:2px;transition:width .25s"></div>
      </div>`;
    el.appendChild(div);
  });
}

function drawRatio(total){
  const active=hours.map((h,i)=>({h,name:ACTS[i].name})).filter(a=>a.h>0);
  const el=document.getElementById('ratio-section');
  if(!active.length){el.textContent='Set some hours above.';return;}
  const doubled=active.map(a=>Math.round(a.h*2));
  const g=doubled.reduce((a,b)=>gcd(a,b));
  const simplified=doubled.map(v=>Math.round(v/g));
  const parts=simplified.reduce((s,v)=>s+v,0);
  const perPart=(24/parts).toFixed(2);
  el.innerHTML=
    `Ratio: <span class="rs-hl">${active.map(a=>a.name).join(' : ')}</span>\n`+
    `= <span class="rs-hl">${active.map(a=>fmtH(a.h)).join(' : ')}</span>\n`+
    `= <span class="rs-hl">${simplified.join(' : ')}</span>  (simplified)\n`+
    `${parts} equal parts total  ·  each part = 24 ÷ ${parts} = <span class="rs-hl">${perPart}h</span>`;
}

function drawInsight(total){
  const top=[...hours.map((h,i)=>({h,n:ACTS[i].name}))].sort((a,b)=>b.h-a.h);
  const nonZero=top.filter(x=>x.h>0);
  const el=document.getElementById('insight-row');
  el.innerHTML=`<div class="ins-bar"></div><p class="ins-text">${
    nonZero.length<2?'Add more activities above.':
    `Most time on <strong>${nonZero[0].n}</strong> (${fmtH(nonZero[0].h)}), least on <strong>${nonZero[nonZero.length-1].n}</strong> (${fmtH(nonZero[nonZero.length-1].h)}). A day has a fixed total of 24 hours — this is exactly what "dividing a whole in a ratio" means.${total>24?'<br><strong style="color:#b83020">Total exceeds 24 hours — reduce some activities.</strong>':total<22?`<br>${fmtH(24-total)} unaccounted — where does that time go?`:''}`
  }</p>`;
}

update();
</script>
</body>
</html>
